<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoBet — Card Redesign</title>
  <meta name="description" content="RoBet redesign pentru cardurile de meci, inspirat din prototipul încărcat." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Repo nou • start curat</p>
        <h1>Predicții + statistici BSD</h1>
        <p class="hero-copy">
          Varianta de redesign pentru cardurile de meci, mai compactă și mai clară pe mobil.
        </p>
      </div>
      <div class="hero-actions">
        <button id="refreshButton" class="primary-btn" type="button">Reîncarcă datele</button>
      </div>
    </header>

    <section class="panel meta-panel">
      <div id="metaGrid" class="meta-grid"></div>
    </section>

    <section class="panel controls-panel">
      <div class="controls-grid">
        <label>
          <span>Caută echipă / ligă</span>
          <input id="searchInput" type="search" placeholder="ex: Arsenal, La Liga" />
        </label>

        <label>
          <span>Filtru ligă</span>
          <select id="leagueFilter">
            <option value="">Toate ligile</option>
          </select>
        </label>

        <label>
          <span>Sortează</span>
          <select id="sortSelect">
            <option value="dateAsc">Ora meciului ↑</option>
            <option value="dateDesc">Ora meciului ↓</option>
            <option value="confidenceDesc">Confidence ↓</option>
            <option value="homeWinDesc">Prob. gazde ↓</option>
            <option value="over25Desc">Prob. over 2.5 ↓</option>
          </select>
        </label>
      </div>
    </section>

    <section class="panel status-panel">
      <div id="statusMessage" class="status-message">Se încarcă feed-ul...</div>
    </section>

    <section id="matchesGrid" class="matches-grid"></section>
  </div>

  <script src="./assets/app.js" defer></script>
  <script src="./assets/best-market-override.js" defer></script>
  <script src="./assets/value-display-override.js" defer></script>
</body>
</html>
