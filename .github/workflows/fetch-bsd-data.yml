name: Fetch BSD data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify secret exists
        run: |
          if [ -z "${{ secrets.BSD_API_KEY }}" ]; then
            echo "BSD_API_KEY lipsește din GitHub Secrets"
            exit 1
          fi
          echo "BSD_API_KEY există"

      - name: Show files
        run: |
          pwd
          ls -la
          ls -la scripts
          ls -la data

      - name: Generate feed JSON
        env:
          BSD_API_KEY: ${{ secrets.BSD_API_KEY }}
        run: node ./scripts/fetch-bsd-data.mjs

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/feed.json
          if git diff --staged --quiet; then
            echo "Nu există modificări de commit-uit"
          else
            git commit -m "chore: update BSD feed"
            git push
          fi
